<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube</title>
</head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<body>
    <header>
        <div class="top-header">
            <div class="navbar">
                <div class="side-1">
                    <div class="bars">
                        <a href="#">
                            <i class="fa-solid fa-bars"></i>
                        </a>
                    </div>
                    <div class="logo">
                        <a href="#">
                            <img src="Yt-logo.jpg">
                        </a>
                    </div>  
                </div>
                <div class="side-2">
                    <div class="search">
                        <div class="search-in">
                            <input name="textbox" placeholder="Search">
                        </div>
                        <div class="search-icon">
                            <a href="#">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </a>
                        </div>
                    </div>
                    <div class="mic-logo">
                        <a href="#">
                            <i class="fa-solid fa-microphone"></i>
                        </a>
                    </div>
                </div>
                <div class="side-3">
                    <div class="create">
                        <a href="#">
                            <i class="fa-solid fa-plus"></i>
                            <p>
                                Create  
                            </p>
                        </a>
                    </div>
                    <div class="bell">
                        <a href="#">
                            <i class="fa-regular fa-bell"></i>
                        </a>
                    </div>
                    <div class="user">
                        <a href="#">
                            <img src="user-id.jpg">
                        </a>
                    </div>
                </div>
            </div>
            <div class="type-selector">
                <div class="main-selector">
                    <a href="#">All</a>
                    <a href="#">Music</a>
                    <a href="#">Mixes</a>
                    <a href="#">Pakistani dramas</a>
                    <a href="#">Science fiction</a>
                    <a href="#">T-Series</a>
                    <a href="#">Live</a>
                    <a href="#">Data Structures</a>
                    <a href="#">Trailers</a>
                    <a href="#">Kapil Sharma</a>
                    <a href="#">Laptops</a>
                    <a href="#">Movie musicals</a>
                    <a href="#">Pritam Chakraborty</a>
                    <a href="#">AI</a>
                    <a href="#">Indian pop music</a>
                    <a href="#">Presentations</a>
                </div>
            </div>
        </div>
    </header>
    <main>
        <div class="side-panel">
            <div class="home">
                <a href="#">
                    <i class="fa-solid fa-house"></i>
                    <p>Home</p>   
                </a>
            </div>
            <div class="short">
                <a href="#">
                    <img src="shorts.svg">
                    <p>Shorts</p>   
                </a>
            </div>
            <div class="sub">
                <a href="#">
                    <img src="sub-logo.svg">
                    <p>Subscriptions</p>   
                </a>
            </div>
            <div class="you">
                <a href="#">
                    <img src="profile-logo.svg">
                    <p>You</p>   
                </a>
            </div>
        </div>
    </main>
</body>
</html>
